x-runtipi:
  schema_version: 2
services:
  atvloadly:
    image: bitxeno/atvloadly
    hostname: atvloadly
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /var/run/dbus:/var/run/dbus
      - /var/run/avahi-daemon:/var/run/avahi-daemon
    privileged: true
    x-runtipi:
      internal_port: 80
      is_main: true
